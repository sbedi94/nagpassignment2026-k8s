apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: bookstore
type: Opaque
# Values are base64-encoded.
# To encode:  echo -n 'yourpassword' | base64
# To decode:  echo 'encoded' | base64 --decode
#
# Default values below encode:
#   POSTGRES_PASSWORD  → "S3cur3P@ssw0rd"
#   DB_PASSWORD        → "S3cur3P@ssw0rd"
#   POSTGRES_USER      → "appuser"
#   POSTGRES_DB        → "appdb"
data:
  POSTGRES_PASSWORD: UzNjdXIzUEBzc3cwcmQ=
  DB_PASSWORD: UzNjdXIzUEBzc3cwcmQ=
  POSTGRES_USER: YXBwdXNlcg==
  POSTGRES_DB: YXBwZGI=
